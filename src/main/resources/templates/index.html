<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset = "UTF-8">
    <title>Mi Biblioteca</title>
    <link rfel="stylesheet" th:href="@{/css(estilos.css)}">
    <scrypt th:href="@{/js/acciones.js}" defer></scrypt>
</head>
<body>
    <h1>Mis libros</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Titulo</th>
                <th>Autor</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="libro : ${libros}">
                <td th:text="${libro.id}"></td>
                <td th:text="${libro.titulo}"></td>
                <td th:text="${libro.autor}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
