<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset = "UTF-8">
    <title>Mi Biblioteca</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <script type="text/javascript" th:src="@{/js/acciones.js}" defer></script>
</head>
    <body>
        <h1>Gestión de biblioteca</h1>
        <section>
            <h3>Filtrar por autor</h3>
            <form action="/libros/filtrar" method="GET">
                <input type="text" name="autor_" placeholder="Nombre del autor: ">
                <button type="submit">Filtrar</button>
                <a href="/libros"><button type="button">Limpiar</button></a>
            </form>
        </section>
        <hr> <section>
            <div id="form-añadir">
            <h3>Añadir un nuevo libro</h3>
                <input type="text" id="nuevo-titulo" placeholder="Titulo" required>
                <input type="text" id="nuevo-autor" placeholder="Autor" required>
                <button type="button" onclick="añadirConJS()" style="background-color: #28a745; color:white;">Guardar en la biblioteca</button>
            </div>
        </section>
        <hr>
        <table border="1">
            <thead>
                <tr>
                    <td>ID</td>
                    <td>Titulo</td>
                    <td>Autor</td>
                </tr>
            </thead>
            <tbody>
                <tr th:each="libro : ${libros}" th:id="'fila-' + ${libro.id}">
                    <td th:text="${libro.id}"></td>
                    <td th:text="${libro.titulo}"></td>
                    <td th:text="${libro.autor}"></td>
                    <td>
                        <button type="button"
                            th:data-id="${libro.id}"
                            onclick="borrarConJS(this)"
                            style="background-color:#ff4d4d; color:white;border:none;padding:5px 10px;cursor:pointer;border-radius:4px">
                            Eliminar
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </body>
